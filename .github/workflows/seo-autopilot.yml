name: SEO autopilot

on:
  workflow_dispatch:
  schedule:
    - cron: "10 3 * * *"

permissions:
  contents: write

concurrency:
  group: seo-autopilot
  cancel-in-progress: true

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Analyze Google SERP competitors
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_GL: us
          GOOGLE_HL: zh-cn
        run: node scripts/seo-autopilot.mjs

      - name: Regenerate SEO pages
        run: node scripts/update-seo-pages.mjs

      - name: Commit autopilot changes
        run: |
          if [ -z "$(git status --short README.md index.html seo-insights.html competitors.html sitemap.xml robots.txt llms.txt topics archive data reports)" ]; then
            echo "No SEO autopilot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html seo-insights.html competitors.html sitemap.xml robots.txt llms.txt topics/*.html archive/*.html data/*.json reports/*.md reports/*.json
          git commit -m "Run SEO autopilot"
          git push
